<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ficha 001</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #222; /* El fondo es la mesa de trabajo */
            font-family: 'Special Elite', Courier, monospace;
        }

        .zettel {
            width: 500px;
            height: 300px;
            background-color: #fffef0; /* Papel viejo */
            padding: 40px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.5);
            position: relative;
            color: #111;
            /* Líneas de ficha bibliográfica */
            background-image: linear-gradient(#e5e5e5 1px, transparent 1px);
            background-size: 100% 1.5rem;
            line-height: 1.5rem;
        }

        .zettel-header {
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 0.8rem;
            color: #888;
        }

        .text-machine {
            margin-top: 20px;
            font-size: 1.1rem;
            white-space: pre-wrap;
        }

        .return-fichero {
            position: fixed;
            bottom: 20px;
            color: #eee;
            text-decoration: none;
            font-size: 0.7rem;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="zettel">
        <div class="zettel-header">ID: 001 / 2026</div>
        <div class="text-machine">
...............
        </div>
    </div>

    <a href="fichas.html" class="return-fichero">VOLVER AL FICHERO</a>
</body>
</html>
